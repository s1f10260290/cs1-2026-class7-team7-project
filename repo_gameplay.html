<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="repo.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gameplay</title>
</head>
<body>

<div class="container">

    <header>
        <!-- ここのロゴ画像にするかも？ -->
        <div class="logo">REPO</div> 

        <div class="menu">
            <ul>
                <li><a href="">TOP</a></li>
                <li><a href="">ABOUT</a></li>
                <li><a href="">CHARACTERS</a></li>
                <li><a href="">GAMEPLAY</a></li>
                <li><a href="">GALLERY</a></li>
            </ul>
        </menu>
    </header>

    <main>

        <h1>GAMEPLAY</h1>
        <h2 class="gameplay_about">遊び方・特徴</h2>

        <section class="steps">

            <div class="step">
                <img src="" alt="">
                <h3>1. 物を探す</h3>
                <p>マップ内にある価値のあるアイテムを集める</p>
            </div>

            <div class="arrow">→</div>

            <div class="step">
                <img src="" alt="">
                <h3>2. 持ち運ぶ</h3>
                <p>アイテムを回収し、仲間と協力して運ぶ</p>
            </div>

            <div class="arrow">→</div>

            <div class="step">
                <img src="" alt="">
                <h3>3. 納品する</h3>
                <p>回収地点までアイテムを運び、目標金額を達成する</p>
            </div>

            <div class="arrow">→</div>

            <div class="step">
                <img src="" alt="">
                <h3>4. 生き残る</h3>
                <p>モンスターから逃げ切り、車を発進させる</p>
            </div>

        </section>

        <section class="feature-list">
            <h2>REPOの特徴</h2>

            <ul>
                <li>最大6人のオンライン協力プレイ</li>
                <li>個性的で印象に残るモンスター</li>
                <li>物理演算を活かした荷物運び</li>
                <li>ホラー要素と笑いの融合</li>
            </ul>
        </section>

    </main>

</div>

</body>
</html>
